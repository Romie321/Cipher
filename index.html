<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ceasar Cipher</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="page-wrapper">
      <div id="container-1">
        <h1 id="container-title">Ceasar Cipher</h1>
        <img
          id="container-img"
          src="https://miro.medium.com/v2/resize:fit:1024/1*Rs6ALh-ISIXLHAjzBEl2wg.jpeg"
          alt="Ceasar Cipher Image"
        />
      </div>
      <div id="container-2">
        <label>
          <textarea
            type="text"
            id="encryptInput-1"
            placeholder="Enter encrypted text here"
          ></textarea>
        </label>
        <input
          type="number"
          id="shiftInput"
          min="0"
          max="25"
          placeholder="Shift value (0-25)"
        />
        <button id="encrypt-btn">Decrypt</button>
        <button id="copyToClipBoard">Copy text</button>
        <br />
        <label>
          <textarea
            type="text"
            id="plainInput-1"
            placeholder="Plain text will appear here"
            readonly
          ></textarea>
        </label>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
