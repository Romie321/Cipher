<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ceasar Cipher</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="page-wrapper">
      <div id="container-1">
        <h1 id="container-title">Ceasar Cipher</h1>
        <img
          id="container-img"
          src="https://framemark.vam.ac.uk/collections/2015HR4128/full/!600,/0/default.jpg"
          alt="Ceasar Cipher Image"
        />
      </div>
      <div id="container-2">
        <label>
          <textarea
            type="text"
            id="encryptInput-1"
            placeholder="Enter encrypted text here"
          ></textarea>
        </label>
        <button id="decrypt-btn">Decrypt</button>
        <br />
        <label>
          <textarea
            type="text"
            id="plainInput-1"
            placeholder="Plain text will appear here"
            readonly
          ></textarea>
        </label>
        <button id="copyToClipBoard">Copy text</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
